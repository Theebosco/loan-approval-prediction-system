<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply for Loan</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 relative overflow-x-hidden">
  <div class="pointer-events-none fixed inset-0 -z-10">
    <div class="absolute -top-32 -left-40 h-96 w-96 rounded-full bg-rose-200/70 blur-3xl"></div>
    <div class="absolute top-1/2 right-0 h-96 w-96 rounded-full bg-sky-200/70 blur-3xl"></div>
  </div>

  <nav data-nav class="sticky top-0 z-20 border-b border-slate-200/70 bg-white/80 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between gap-6 px-6 py-4">
      <div class="flex items-center gap-3">
        <span class="flex h-10 w-10 items-center justify-center rounded-xl bg-rose-100 text-rose-500">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6M9 16h6M13 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V9l-7-5z" />
          </svg>
        </span>
        <div>
          <p class="text-xs uppercase tracking-[0.3em] text-rose-500">SmartLoan AI</p>
          <h1 class="text-lg font-semibold text-slate-900">Loan Application</h1>
        </div>
      </div>
      <div class="flex flex-wrap items-center gap-2">
        <a href="dashboard.html" class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:-translate-y-0.5 hover:border-rose-300 hover:text-rose-500">Dashboard</a>
        <a href="#" id="logoutBtn" class="rounded-full bg-rose-500 px-4 py-2 text-sm font-semibold text-white shadow-lg shadow-rose-500/30 transition hover:-translate-y-0.5 hover:bg-rose-400">Logout</a>
      </div>
    </div>
  </nav>

  <main class="mx-auto flex max-w-5xl flex-col gap-8 px-6 py-12">
    <section class="text-center" data-animate>
      <h2 class="text-3xl font-semibold text-slate-900">Complete your application</h2>
      <p class="mt-3 text-slate-600">Provide accurate income and credit history details so the model can calculate a fair risk score.</p>
    </section>

    <section class="rounded-3xl border border-slate-200/70 bg-white/80 p-8 shadow-2xl shadow-rose-200/60" data-animate>
      <h3 class="text-xl font-semibold text-slate-900">Loan application form</h3>
      <p class="mt-2 text-sm text-slate-600">All fields are required to generate a prediction.</p>

      <form id="predictorForm" class="mt-6 grid gap-6">
        <div class="grid gap-4 md:grid-cols-2">
          <label class="text-sm font-semibold text-slate-700">
            Gender
            <select name="gender" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 focus:border-rose-300 focus:outline-none focus:ring-2 focus:ring-rose-300/40">
              <option value="">Select Gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </label>

          <label class="text-sm font-semibold text-slate-700">
            Married
            <select name="married" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 focus:border-rose-300 focus:outline-none focus:ring-2 focus:ring-rose-300/40">
              <option value="">Select Status</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </label>

          <label class="text-sm font-semibold text-slate-700">
            Education
            <select name="education" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 focus:border-rose-300 focus:outline-none focus:ring-2 focus:ring-rose-300/40">
              <option value="">Select Education</option>
              <option value="Graduate">Graduate</option>
              <option value="Not Graduate">Not Graduate</option>
            </select>
          </label>

          <label class="text-sm font-semibold text-slate-700">
            Employment Status
            <select name="employmentStatus" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 focus:border-rose-300 focus:outline-none focus:ring-2 focus:ring-rose-300/40">
              <option value="">Select Employment Status</option>
              <option value="Employed">Employed</option>
              <option value="Self Employed">Self Employed</option>
              <option value="Not Employed">Not Employed</option>
            </select>
          </label>

          <label class="text-sm font-semibold text-slate-700">
            Credit History
            <select name="creditHistory" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 focus:border-rose-300 focus:outline-none focus:ring-2 focus:ring-rose-300/40">
              <option value="">Select Credit History</option>
              <option value="1">1 - Good Credit History</option>
              <option value="0">0 - Bad Credit History</option>
            </select>
          </label>

          <label class="text-sm font-semibold text-slate-700">
            Applicant Income
            <input type="number" name="applicantIncome" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 focus:border-rose-300 focus:outline-none focus:ring-2 focus:ring-rose-300/40" />
          </label>

          <label class="text-sm font-semibold text-slate-700">
            Co-applicant Income
            <input type="number" name="coapplicantIncome" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 focus:border-rose-300 focus:outline-none focus:ring-2 focus:ring-rose-300/40" />
          </label>

          <label class="text-sm font-semibold text-slate-700">
            Loan Amount
            <input type="number" name="loanAmount" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 focus:border-rose-300 focus:outline-none focus:ring-2 focus:ring-rose-300/40" />
          </label>
        </div>

        <button type="submit" class="rounded-2xl bg-rose-500 px-6 py-3 text-sm font-semibold text-white shadow-lg shadow-rose-500/30 transition hover:-translate-y-1 hover:bg-rose-400">Submit application</button>
      </form>

      <p id="message" class="mt-4 text-sm text-slate-600"></p>
    </section>
  </main>

  <script src="js/ui.js"></script>
  <script src="js/predictor.js"></script>
</body>
</html>
