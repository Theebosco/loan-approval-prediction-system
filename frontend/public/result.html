<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loan Result</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 relative overflow-x-hidden">
  <div class="pointer-events-none fixed inset-0 -z-10">
    <div class="absolute -top-32 -left-40 h-96 w-96 rounded-full bg-rose-200/70 blur-3xl"></div>
    <div class="absolute bottom-0 right-0 h-96 w-96 rounded-full bg-sky-200/70 blur-3xl"></div>
  </div>

  <nav data-nav class="sticky top-0 z-20 border-b border-slate-200/70 bg-white/80 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between gap-6 px-6 py-4">
      <div class="flex items-center gap-3">
        <span class="flex h-10 w-10 items-center justify-center rounded-xl bg-rose-100 text-rose-500">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3l7 4v6c0 5-7 8-7 8s-7-3-7-8V7l7-4z" />
          </svg>
        </span>
        <div>
          <p class="text-xs uppercase tracking-[0.3em] text-rose-500">SmartLoan AI</p>
          <h1 class="text-lg font-semibold text-slate-900">Loan Result</h1>
        </div>
      </div>
      <div class="flex flex-wrap items-center gap-2">
        <a href="dashboard.html" class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:-translate-y-0.5 hover:border-rose-300 hover:text-rose-500">Dashboard</a>
        <a href="predictor.html" class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:-translate-y-0.5 hover:border-rose-300 hover:text-rose-500">Apply Again</a>
      </div>
    </div>
  </nav>

  <main class="mx-auto flex max-w-4xl flex-col gap-8 px-6 py-12">
    <section class="rounded-3xl border border-slate-200/70 bg-white/80 p-8 text-center shadow-2xl shadow-rose-200/60" data-animate>
      <div id="resultBox" class="mx-auto flex items-center justify-center rounded-2xl border border-slate-200 bg-slate-50 px-6 py-6 text-2xl font-semibold text-slate-900"></div>
      <p id="scoreText" class="mt-4 text-sm text-slate-600"></p>
      <div class="mt-6 flex flex-wrap justify-center gap-3">
        <a href="dashboard.html" class="rounded-2xl bg-rose-500 px-5 py-3 text-sm font-semibold text-white shadow-lg shadow-rose-500/30 transition hover:-translate-y-1 hover:bg-rose-400">Back to dashboard</a>
        <a href="predictor.html" class="rounded-2xl border border-rose-200 px-5 py-3 text-sm font-semibold text-rose-500 transition hover:-translate-y-1 hover:border-rose-300">Start another check</a>
      </div>
    </section>
  </main>

  <script src="js/ui.js"></script>
  <script src="js/result.js"></script>
</body>
</html>
