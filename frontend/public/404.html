<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 relative overflow-x-hidden" data-error-page>
  <div class="pointer-events-none fixed inset-0 -z-10">
    <div class="absolute -top-32 -left-40 h-96 w-96 rounded-full bg-rose-200/70 blur-3xl"></div>
    <div class="absolute bottom-0 right-0 h-96 w-96 rounded-full bg-sky-200/70 blur-3xl"></div>
  </div>

  <main class="mx-auto flex max-w-4xl flex-col items-center justify-center gap-6 px-6 py-24 text-center">
    <span class="rounded-full bg-rose-100 px-4 py-2 text-xs font-semibold uppercase tracking-[0.25em] text-rose-500">Error 404</span>
    <h1 class="text-4xl font-semibold text-slate-900">We couldn’t find that page.</h1>
    <p class="max-w-xl text-slate-600">The link you followed doesn’t match any active page. Please head back to the dashboard or start a new session.</p>
    <div class="flex flex-wrap justify-center gap-3">
      <a href="index.html" class="rounded-full border border-slate-200 px-5 py-2 text-sm font-semibold text-slate-700 transition hover:-translate-y-0.5 hover:border-rose-300 hover:text-rose-500">Go home</a>
      <a href="dashboard.html" class="rounded-full bg-rose-500 px-5 py-2 text-sm font-semibold text-white shadow-lg shadow-rose-500/30 transition hover:-translate-y-0.5 hover:bg-rose-400">Open dashboard</a>
    </div>
  </main>
</body>
</html>
