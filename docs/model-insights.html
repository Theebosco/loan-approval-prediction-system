<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Model Insights</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar">
  <h1>Model Insights</h1>
  <div>
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
  </div>
</nav>

<main class="container">

  <section class="card">
    <h2>Technical Proof</h2>
    <p><strong>Model Name:</strong> Random Forest Classifier</p>
    <p><strong>Accuracy:</strong> 82%</p>
  </section>

  <section class="card">
    <h2>Feature Importance</h2>
    <canvas id="featureImportanceChart"></canvas>
  </section>

  <section class="card">
    <h2>Confusion Matrix</h2>

    <div class="confusion-matrix">
      <div class="matrix-box correct">
        <strong>True Approved</strong>
        <span>92</span>
      </div>

      <div class="matrix-box wrong">
        <strong>False Approved</strong>
        <span>14</span>
      </div>

      <div class="matrix-box wrong">
        <strong>False Rejected</strong>
        <span>18</span>
      </div>

      <div class="matrix-box correct">
        <strong>True Rejected</strong>
        <span>65</span>
      </div>
    </div>
  </section>

</main>

<script src="js/model-insights.js"></script>
</body>
</html>
