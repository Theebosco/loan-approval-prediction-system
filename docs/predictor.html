<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply for Loan</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar">
  <h1>Apply for Loan</h1>
  <div>
    <a href="dashboard.html">Dashboard</a>
    <a href="model-insights.html">Model Insights</a>
    <a href="#" id="logoutBtn">Logout</a>
  </div>
</nav>

<main class="container">
  <section class="card">
    <h2>Loan Application Form</h2>

    <form id="predictorForm">
      <div class="grid">
        <label>Gender
          <select name="gender" required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </label>

        <label>Married
          <select name="married" required>
            <option value="">Select Status</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>
        </label>

        <label>Education
          <select name="education" required>
            <option value="">Select Education</option>
            <option value="Graduate">Graduate</option>
            <option value="Not Graduate">Not Graduate</option>
          </select>
        </label>

        <label>Employment Status
          <select name="employmentStatus" required>
            <option value="">Select Employment Status</option>
            <option value="Employed">Employed</option>
            <option value="Self Employed">Self Employed</option>
            <option value="Not Employed">Not Employed</option>
          </select>
        </label>

        <label>Credit History
          <select name="creditHistory" required>
            <option value="">Select Credit History</option>
            <option value="1">1 - Good Credit History</option>
            <option value="0">0 - Bad Credit History</option>
          </select>
        </label>

        <label>Applicant Income
          <input type="number" name="applicantIncome" placeholder="Enter applicant income" required />
        </label>

        <label>Co-applicant Income
          <input type="number" name="coapplicantIncome" placeholder="Enter co-applicant income" required />
        </label>

        <label>Loan Amount
          <input type="number" name="loanAmount" placeholder="Enter loan amount" required />
        </label>
      </div>

      <button type="submit">Submit</button>
    </form>

    <p id="message"></p>
  </section>
</main>

<script src="js/predictor.js"></script>
</body>
</html>
