<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar">
  <h1>SmartLoan AI Dashboard</h1>
  <div>
    <a href="index.html">Home</a>
    <a href="predictor.html">Apply Loan</a>
    <a href="model-insights.html">Model Insights</a>
    <a href="#" id="logoutBtn">Logout</a>
  </div>
</nav>

<main class="container">

  <section class="card dashboard-welcome">
    <h2>Welcome to Your Dashboard</h2>
    <p>View your loan data summary before applying for a loan.</p>
    <a href="predictor.html" class="primary-link-button">Apply for Loan</a>
  </section>

  <section class="stats-grid">
    <div class="stat-card">
      <h3>Total Records</h3>
      <p id="total">0</p>
    </div>

    <div class="stat-card">
      <h3>Approval Rate</h3>
      <p id="approvalRate">0%</p>
    </div>

    <div class="stat-card">
      <h3>Avg Loan Amount</h3>
      <p id="avgLoan">0</p>
    </div>
  </section>

  <section class="card">
    <h2>Credit History vs Approval</h2>
    <canvas id="barChart"></canvas>
  </section>

  <section class="card">
    <h2>Approved vs Rejected</h2>
    <canvas id="pieChart"></canvas>
  </section>

</main>

<script src="js/dashboard.js"></script>
</body>
</html>
